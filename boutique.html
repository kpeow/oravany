<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F4EFE7">
    <meta name="description" content="Boutique ORAVANY — Découvrez notre sélection de poivres sauvages, vanille Bourbon, épices rares et riz d'exception de Madagascar.">
    <title>Boutique — ORAVANY</title>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        .filter-btn {
            padding: 0.7rem 1.5rem;
            border: 1px solid var(--color-grey-light);
            background-color: var(--color-white);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-black);
            cursor: pointer;
            transition: all var(--transition);
            border-radius: 2px;
        }
        .filter-btn:hover { border-color: var(--color-gold); color: var(--color-gold); }
        .filter-btn.active {
            background-color: var(--color-green);
            color: var(--color-cream);
            border-color: var(--color-green);
        }
    </style>
</head>
<body data-page="boutique">

<div id="header-host"></div>

<section class="page-header">
    <div class="container">
        <p class="breadcrumb"><a href="index.html">Accueil</a><span class="sep">/</span>Boutique</p>
        <h1>Notre Boutique</h1>
        <p style="color:var(--color-grey); max-width:600px; margin:1rem auto 0;">
            Découvrez l'ensemble de notre collection : poivres sauvages, vanille Bourbon, épices rares et riz d'exception, sélectionnés au cœur des terroirs malgaches.
        </p>
    </div>
</section>

<section class="section" style="padding-top: 1rem;">
    <div class="container">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all">Tout</button>
            <button class="filter-btn" data-cat="poivres">Poivres sauvages</button>
            <button class="filter-btn" data-cat="vanille">Vanille</button>
            <button class="filter-btn" data-cat="epices">Épices rares</button>
            <button class="filter-btn" data-cat="riz">Riz</button>
        </div>
        <div class="products-grid" id="products-grid"></div>
    </div>
</section>

<div id="footer-host"></div>

<script src="js/products.js"></script>
<script src="js/script.js"></script>
<script>
    let currentCategory = getQueryParam('cat') || 'all';

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        if (!grid) return;
        const list = getProductsByCategory(currentCategory);

        if (list.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--color-grey); padding:3rem;">Aucun produit dans cette catégorie pour le moment.</p>`;
            return;
        }

        grid.innerHTML = list.map(p => `
            <article class="product-card">
                <a href="produit.html?id=${p.id}" class="product-card-image">
                    ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                </a>
                <div class="product-card-body">
                    <a href="produit.html?id=${p.id}">
                        <h3 class="product-card-name">${p.name}</h3>
                        <p class="product-card-latin">${p.latinName}</p>
                    </a>
                    <p class="product-card-desc">${p.shortDesc}</p>
                    <div class="product-card-footer">
                        <span class="product-card-price">${formatPrice(p.price)}<span class="unit">/${p.unit}</span></span>
                        <button class="add-to-cart-btn" onclick="addToCart('${p.id}', '${p.formats[0].label}', 1)">Ajouter</button>
                    </div>
                </div>
            </article>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Activer le filtre courant
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.cat === currentCategory) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                const url = new URL(window.location);
                if (currentCategory === 'all') url.searchParams.delete('cat');
                else url.searchParams.set('cat', currentCategory);
                history.replaceState(null, '', url);
                renderProducts();
            });
        });
        renderProducts();
    });
</script>
</body>
</html>
