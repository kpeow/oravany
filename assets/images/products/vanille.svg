<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="vbg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#5a4830"/>
      <stop offset="100%" stop-color="#2a2018"/>
    </radialGradient>
    <linearGradient id="pod" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a1e10"/>
      <stop offset="30%" stop-color="#4a3520"/>
      <stop offset="60%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="podHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#8b5a2e"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#vbg)"/>

  <!-- Decorative dots pattern -->
  <g fill="#8B6B2E" opacity="0.15">
    <circle cx="100" cy="120" r="2"/>
    <circle cx="700" cy="180" r="2"/>
    <circle cx="150" cy="700" r="2"/>
    <circle cx="650" cy="650" r="2"/>
    <circle cx="80" cy="400" r="2"/>
    <circle cx="720" cy="450" r="2"/>
  </g>

  <!-- Vanilla pods arranged -->
  <g transform="translate(400 400) rotate(-15)">
    <!-- Pod 1 -->
    <g transform="rotate(-12) translate(-160 -20)">
      <rect x="-120" y="-12" width="240" height="24" rx="12" fill="url(#pod)"/>
      <rect x="-120" y="-12" width="240" height="24" rx="12" fill="url(#podHi)" opacity="0.4"/>
      <path d="M -120 0 Q -130 -6 -135 0 Q -130 6 -120 0" fill="#1a1208"/>
      <path d="M 120 0 Q 130 -6 135 0 Q 130 6 120 0" fill="#1a1208"/>
      <line x1="-100" y1="0" x2="100" y2="0" stroke="#1a1208" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Pod 2 -->
    <g transform="rotate(8) translate(-140 30)">
      <rect x="-130" y="-11" width="260" height="22" rx="11" fill="url(#pod)"/>
      <rect x="-130" y="-11" width="260" height="22" rx="11" fill="url(#podHi)" opacity="0.4"/>
      <path d="M -130 0 Q -140 -5 -145 0 Q -140 5 -130 0" fill="#1a1208"/>
      <path d="M 130 0 Q 140 -5 145 0 Q 140 5 130 0" fill="#1a1208"/>
      <line x1="-110" y1="0" x2="110" y2="0" stroke="#1a1208" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Pod 3 -->
    <g transform="rotate(-22) translate(-150 80)">
      <rect x="-125" y="-10" width="250" height="20" rx="10" fill="url(#pod)"/>
      <rect x="-125" y="-10" width="250" height="20" rx="10" fill="url(#podHi)" opacity="0.4"/>
      <path d="M -125 0 Q -135 -5 -140 0 Q -135 5 -125 0" fill="#1a1208"/>
      <path d="M 125 0 Q 135 -5 140 0 Q 135 5 125 0" fill="#1a1208"/>
    </g>

    <!-- Pod 4 -->
    <g transform="rotate(15) translate(-100 -80)">
      <rect x="-110" y="-9" width="220" height="18" rx="9" fill="url(#pod)" opacity="0.85"/>
    </g>
  </g>

  <!-- Brand mark (logo ORAVANY fidèle) -->
  <g transform="translate(400 100)" opacity="0.9">
    <g stroke="#d4b87a" stroke-width="1.5" fill="none" stroke-linecap="round">
      <ellipse cx="0" cy="-15" rx="6" ry="16"/>
      <ellipse cx="0" cy="15" rx="6" ry="16"/>
      <ellipse cx="-15" cy="0" rx="16" ry="6"/>
      <ellipse cx="15" cy="0" rx="16" ry="6"/>
    </g>
    <g fill="#d4b87a">
      <circle cx="0" cy="-38" r="1.8"/>
      <circle cx="0" cy="38" r="1.8"/>
      <circle cx="-38" cy="0" r="1.8"/>
      <circle cx="38" cy="0" r="1.8"/>
    </g>
  </g>

  <text x="400" y="700" text-anchor="middle" fill="#d4b87a" font-family="serif" font-size="28" letter-spacing="6">VANILLE BOURBON</text>
  <text x="400" y="730" text-anchor="middle" fill="#d4b87a" font-family="serif" font-size="14" font-style="italic" opacity="0.75">Vanilla planifolia</text>
  <line x1="350" y1="755" x2="450" y2="755" stroke="#d4b87a" stroke-width="1" opacity="0.6"/>
</svg>
