<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="cbg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7a5a35"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </radialGradient>
    <linearGradient id="cinn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16b35"/>
      <stop offset="100%" stop-color="#4a2810"/>
    </linearGradient>
    <linearGradient id="cinnHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c89058"/>
      <stop offset="100%" stop-color="#6a3818"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#cbg)"/>

  <!-- Decorative -->
  <g fill="#f4efe7" opacity="0.08">
    <circle cx="120" cy="150" r="2"/>
    <circle cx="680" cy="200" r="2"/>
    <circle cx="100" cy="650" r="2"/>
    <circle cx="700" cy="600" r="2"/>
  </g>

  <!-- Cinnamon sticks stacked -->
  <g transform="translate(400 400) rotate(-12)">
    <!-- Stick 1 (back) -->
    <g transform="translate(-50 -50) rotate(-10)">
      <rect x="-180" y="-32" width="360" height="64" rx="6" fill="url(#cinn)"/>
      <rect x="-180" y="-32" width="360" height="14" fill="url(#cinnHi)" opacity="0.5"/>
      <ellipse cx="-180" cy="0" rx="6" ry="32" fill="#2a1408"/>
      <ellipse cx="180" cy="0" rx="6" ry="32" fill="#2a1408"/>
      <!-- Curl marks -->
      <line x1="-160" y1="-32" x2="-160" y2="32" stroke="#2a1408" stroke-width="1" opacity="0.5"/>
      <line x1="-130" y1="-32" x2="-130" y2="32" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
      <line x1="-100" y1="-32" x2="-100" y2="32" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
      <line x1="-70" y1="-32" x2="-70" y2="32" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Stick 2 (front) -->
    <g transform="translate(20 30) rotate(8)">
      <rect x="-180" y="-30" width="360" height="60" rx="6" fill="url(#cinn)"/>
      <rect x="-180" y="-30" width="360" height="14" fill="url(#cinnHi)" opacity="0.5"/>
      <ellipse cx="-180" cy="0" rx="6" ry="30" fill="#2a1408"/>
      <ellipse cx="180" cy="0" rx="6" ry="30" fill="#2a1408"/>
      <line x1="-150" y1="-30" x2="-150" y2="30" stroke="#2a1408" stroke-width="1" opacity="0.5"/>
      <line x1="-110" y1="-30" x2="-110" y2="30" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
      <line x1="-70" y1="-30" x2="-70" y2="30" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
      <line x1="-30" y1="-30" x2="-30" y2="30" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
      <line x1="10" y1="-30" x2="10" y2="30" stroke="#2a1408" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Stick 3 (top right) -->
    <g transform="translate(60 -90) rotate(20)">
      <rect x="-140" y="-22" width="280" height="44" rx="5" fill="url(#cinn)" opacity="0.85"/>
      <rect x="-140" y="-22" width="280" height="10" fill="url(#cinnHi)" opacity="0.3"/>
    </g>
  </g>

  <!-- Brand mark (logo ORAVANY fidèle) -->
  <g transform="translate(400 90)" opacity="0.85">
    <g stroke="#f4efe7" stroke-width="1.5" fill="none" stroke-linecap="round">
      <ellipse cx="0" cy="-15" rx="6" ry="16"/>
      <ellipse cx="0" cy="15" rx="6" ry="16"/>
      <ellipse cx="-15" cy="0" rx="16" ry="6"/>
      <ellipse cx="15" cy="0" rx="16" ry="6"/>
    </g>
    <g fill="#f4efe7">
      <circle cx="0" cy="-38" r="1.8"/>
      <circle cx="0" cy="38" r="1.8"/>
      <circle cx="-38" cy="0" r="1.8"/>
      <circle cx="38" cy="0" r="1.8"/>
    </g>
  </g>

  <text x="400" y="700" text-anchor="middle" fill="#f4efe7" font-family="serif" font-size="28" letter-spacing="6">CANNELLE</text>
  <text x="400" y="730" text-anchor="middle" fill="#f4efe7" font-family="serif" font-size="14" font-style="italic" opacity="0.75">Cinnamomum verum</text>
  <line x1="350" y1="755" x2="450" y2="755" stroke="#f4efe7" stroke-width="1" opacity="0.6"/>
</svg>
